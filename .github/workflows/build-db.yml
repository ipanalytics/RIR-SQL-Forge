name: Build RIR Database

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-rir-database
  cancel-in-progress: false

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Remove stale same-day release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="db-$(date -u +%F)"
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true

      - name: Test
        run: go test ./...

      - name: Build binary
        run: go build -o rir-sql-forge ./cmd/rir-sql-forge

      - name: Compile public RIR database
        timeout-minutes: 120
        run: ./rir-sql-forge compile --output dist --work-dir tmp/rir-sql-forge

      - name: Compress assets
        run: |
          gzip -c dist/net_owner_directory.sqlite > net_owner_directory.sqlite.gz
          gzip -c dist/net_owner_directory.csv > net_owner_directory.csv.gz
          gzip -c dist/net_owner_directory.duckdb > net_owner_directory.duckdb.gz

      - name: Build release notes
        run: |
          {
            echo "Automated RIR abuse-contact directory build for db-$(date -u +%F)"
            echo
            cat dist/net_owner_directory.stats.md
          } > release-notes.md

      - name: Update README dataset stats
        run: |
          python3 - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          stats = Path("dist/net_owner_directory.stats.md").read_text()
          text = readme.read_text()
          start = "<!-- DATASET_STATS_START -->"
          end = "<!-- DATASET_STATS_END -->"
          before, rest = text.split(start, 1)
          _, after = rest.split(end, 1)
          readme.write_text(before + start + "\n" + stats.rstrip() + "\n" + end + after)
          PY

      - name: Commit README dataset stats
        run: |
          if git diff --quiet README.md; then
            echo "README dataset stats already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update dataset saturation stats"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="db-$(date -u +%F)"
          gh release create "$RELEASE_TAG" \
            net_owner_directory.sqlite.gz \
            net_owner_directory.csv.gz \
            net_owner_directory.duckdb.gz \
            dist/net_owner_directory.parquet \
            dist/net_owner_directory.stats.json \
            dist/net_owner_directory.stats.md \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest \
          || gh release upload "$RELEASE_TAG" \
            net_owner_directory.sqlite.gz \
            net_owner_directory.csv.gz \
            net_owner_directory.duckdb.gz \
            dist/net_owner_directory.parquet \
            dist/net_owner_directory.stats.json \
            dist/net_owner_directory.stats.md \
            --clobber
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest
